# SearXNG settings - optimized for China network
# All engine names verified against official SearXNG source (2026.3.6)
# DNS resolution handled by Docker container dns config (docker-compose.yml)

use_default_settings:
  engines:
    keep_only:
      # === General Search ===
      - bing
      - baidu
      - sogou
      - 360search
      - mojeek
      - presearch
      # === Images ===
      - bing images
      - baidu images
      - sogou images
      - mojeek images
      - presearch images
      - unsplash
      - pexels
      - pixabay images
      # === News ===
      - bing news
      - mojeek news
      - presearch news
      # === Videos ===
      - bing videos
      - bilibili
      - iqiyi
      - acfun
      - presearch videos
      # === Academic & Science ===
      - arxiv
      - pubmed
      - semantic scholar
      - crossref
      - openalex
      # === Code & Dev ===
      - github
      - gitlab
      - gitea.com
      - codeberg
      - sourcehut
      - bitbucket
      - stackoverflow
      - superuser
      - askubuntu
      - pypi
      - npm
      - crates.io
      - pub.dev
      - lib.rs
      - rubygems
      - packagist
      - pkg.go.dev
      - docker hub
      - anaconda
      - metacpan
      - huggingface
      - ollama
      # === Wiki & Reference ===
      - mdn
      - microsoft learn
      - arch linux wiki
      - wordnik
      - etymonline
      # === Other ===
      - currency
      - openmeteo
      - wolframalpha
      - openstreetmap
      - photon
      - apple maps
      - apple app store
      - fdroid
      - apk mirror
      - lobste.rs
      - hackernews
      - mymemory translated

general:
  instance_name: "Local SearXNG (CN)"
  debug: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json
    - csv

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme123_local_searxng"
  limiter: false
  image_proxy: true
  http_protocol_version: "1.1"

outgoing:
  request_timeout: 15.0
  max_request_timeout: 25.0
  pool_connections: 100
  pool_maxsize: 20
  # proxies:
  #   all://:
  #     - socks5h://127.0.0.1:1080

engines:
  - name: bing
    timeout: 20.0
  - name: bing images
    timeout: 20.0
  - name: bing news
    timeout: 20.0
  - name: bing videos
    timeout: 20.0
  - name: wolframalpha
    timeout: 20.0
  - name: semantic scholar
    timeout: 20.0
