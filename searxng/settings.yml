general:
  instance_name: "Local SearXNG (CN)"
  debug: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  formats:
    - html
    - json
    - csv

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "changeme123_local_searxng"
  limiter: false
  image_proxy: true
  http_protocol_version: "1.1"

outgoing:
  request_timeout: 15.0
  max_request_timeout: 25.0
  pool_connections: 100
  pool_maxsize: 20
  dns_resolver: "223.5.5.5"
  # Uncomment below if you have a proxy
  # proxies:
  #   all://:
  #     - socks5h://127.0.0.1:1080

# Increase timeout for slower engines
engines:
  - name: wolframalpha
    timeout: 20.0
  - name: semantic scholar
    timeout: 20.0
  - name: bing
    timeout: 20.0
